blueprint:
  name: Solar Surplus Heater Control
  description: >-
    Turns high-power appliances (water heaters, pool pumps, etc.) on and off
    to consume excess solar energy instead of exporting it.

    To control additional devices, create one automation per device using this
    blueprint. Devices are chained by priority: the highest-priority device
    leaves "Higher-priority device" empty, and the lowest-priority device
    leaves "Lower-priority device" empty. Each device in between points to the
    one above and below it in the chain.
  domain: automation
  source_url: https://raw.githubusercontent.com/oticat/ha-blueprints/refs/heads/main/solar_surplus_heater.yaml
  homeassistant:
    min_version: "2024.6.0"

  input:
    device_section:
      name: Device
      icon: mdi:lightning-bolt
      input:
        device_name:
          name: Device name
          description: Human-readable label used in automation title (e.g. "Boiler")
          selector:
            text:

        device_switch:
          name: Device switch
          description: Switch entity that turns the appliance on or off
          selector:
            entity:
              domain: switch

        device_max_watts:
          name: Device rated power (W)
          description: >-
            Expected power draw when running. Used as a pre-flight check: the
            device only turns on if the current grid reading leaves enough
            headroom to absorb this full draw without crossing the grid
            threshold. In zero feed-in mode the check is skipped only when
            grid = 0 W (inverter has genuine surplus); when grid > 0 W the
            inverter is already at capacity and the check still applies.
          default: 1000
          selector:
            number:
              min: 100
              max: 10000
              step: 100
              unit_of_measurement: W

        higher_priority_switch:
          name: Higher-priority device switch (optional)
          description: >-
            Switch of the device that must run before this one. Leave empty
            if this is the highest-priority device. This device turns on only
            after the higher-priority one has been on ≥ 40 s, and turns off
            when the higher-priority one has been off ≥ 40 s.
          default:
          selector:
            entity:
              domain: switch

        lower_priority_switch:
          name: Lower-priority device switch (optional)
          description: >-
            Switch of the device that runs after this one. Leave empty if
            this is the lowest-priority device. While that device is on, this
            device defers grid-overload turn-off — the lower-priority device
            will react first, and this device re-evaluates 40 s after it turns off.
          default:
          selector:
            entity:
              domain: switch

    grid_section:
      name: Grid & Activation
      icon: mdi:transmission-tower
      input:
        grid_sensor:
          name: Grid power sensor
          description: >-
            Sensor measuring grid import (+) / export (−) in watts. Must be
            sign-capable when feed-in is enabled on the inverter.
          selector:
            entity:
              domain: sensor
              filter:
                - unit_of_measurement: W

        grid_sensor_attribute:
          name: Grid sensor attribute (optional)
          description: >-
            If the grid power value lives in a sensor attribute rather than
            the state, enter the attribute name here. Leave empty to use the
            sensor state directly.
          default: ""
          selector:
            text:

        zero_feed_in:
          name: Zero feed-in mode
          description: >-
            Enable if the inverter is configured to never export to the grid.
            Grid power stays ≥ 0 W in this mode — set the threshold near
            zero (e.g. 50 W) to activate when surplus appears.
          default: false
          selector:
            boolean:

        max_grid_consumption:
          name: Grid activation threshold (W)
          description: >-
            Maximum acceptable grid consumption before the device turns off.
            Device turns on when grid is below (threshold − margin) and off
            when above (threshold + margin).
          default: 200
          selector:
            number:
              min: 0
              max: 1000
              step: 50
              unit_of_measurement: W

        anti_flapping_margin:
          name: Anti-flapping margin (W)
          description: >-
            Hysteresis band around the threshold. Device turns on when grid
            consumption drops below (threshold − margin) and turns off when it
            rises above (threshold + margin). Prevents rapid switching when
            grid power oscillates near the activation point.
          default: 100
          selector:
            number:
              min: 50
              max: 500
              step: 10
              unit_of_measurement: W

    solar_section:
      name: Solar Window
      icon: mdi:weather-sunny
      collapsed: true
      input:
        min_elevation:
          name: Minimum sun elevation (°)
          description: >-
            Do not operate when the sun is below this angle. Prevents
            activation at dawn/dusk when panels produce little power.
          default: 10
          selector:
            number:
              min: 0
              max: 45
              step: 1
              unit_of_measurement: "°"

        min_azimuth:
          name: East azimuth boundary (°)
          description: >-
            Do not operate when sun azimuth < this value (morning shade on
            panels). 90 = due East. Increase if morning shade ends later.
          default: 90
          selector:
            number:
              min: 0
              max: 179
              step: 1
              unit_of_measurement: "°"

        max_azimuth:
          name: West azimuth boundary (°)
          description: >-
            Do not operate when sun azimuth > this value (evening shade on
            panels). 270 = due West. Decrease if afternoon shade starts earlier.
          default: 270
          selector:
            number:
              min: 181
              max: 360
              step: 1
              unit_of_measurement: "°"

mode: single
max_exceeded: silent

variables:
  _switch:       !input device_switch
  _hp_switch:    !input higher_priority_switch
  _grid_id:      !input grid_sensor
  _grid_attr:    !input grid_sensor_attribute
  _max_grid:     !input max_grid_consumption
  _margin:       !input anti_flapping_margin
  _min_elev:     !input min_elevation
  _min_az:       !input min_azimuth
  _max_az:       !input max_azimuth
  _zero_feedin:  !input zero_feed_in
  _max_watts:    !input device_max_watts
  _lp_switch:    !input lower_priority_switch
  _effective_margin: "{{ [(_margin | float), ((_max_grid | float) - 25)] | min }}"

  # Grid sensor health and current value
  grid_data_valid: >-
    {{ states(_grid_id) not in ['unknown', 'unavailable'] }}

  grid_power: >-
    {% if _grid_attr %}
      {{ state_attr(_grid_id, _grid_attr) | float(0) }}
    {% else %}
      {{ states(_grid_id) | float(0) }}
    {% endif %}

  # Sun position
  sun_elevation: "{{ state_attr('sun.sun', 'elevation') | float(-90) }}"
  sun_azimuth:   "{{ state_attr('sun.sun', 'azimuth')   | float(180) }}"

  # True when sun is in the usable window (elevation + azimuth range)
  solar_window_ok: >-
    {{ (sun_elevation | float) > (_min_elev | float)
       and (sun_azimuth | float) >= (_min_az | float)
       and (sun_azimuth | float) <= (_max_az | float) }}

  # Grid allows activation: sensor valid AND enough surplus to absorb this device.
  # Pre-flight check: require grid_power + device_max_watts < threshold − margin.
  # This applies both when feed-in is enabled (surplus is visible as negative grid)
  # AND in zero feed-in mode when grid > 0 (inverter is already at capacity, so any
  # new load draws from the grid directly). Only skip the deduction when grid = 0
  # in zero feed-in mode — that means the inverter has genuine headroom to absorb it.
  grid_allows_on: >-
    {% set base = (_max_grid | float) - (_effective_margin | float) %}
    {% set effective = base - (_max_watts | float) if (not _zero_feedin or (grid_power | float) > 0) else base %}
    {{ grid_data_valid and (grid_power | float) < effective }}

  # Grid forces deactivation: sensor unavailable OR above (threshold + margin)
  grid_forces_off: >-
    {{ (not grid_data_valid)
       or (grid_power | float) > ((_max_grid | float) + (_effective_margin | float)) }}

  # Lower-priority device is currently on — defer grid-overload turn-off to it.
  # It will react to grid_import first; lp_off fires here 40 s after it turns off.
  lp_is_on: >-
    {% if _lp_switch is not none %}
      {{ states(_lp_switch) == 'on' }}
    {% else %}
      false
    {% endif %}

  # Higher-priority device has been ON long enough to unlock this device.
  # Always true when no higher-priority device is configured.
  hp_on_stable: >-
    {% if _hp_switch is not none %}
      {{ states(_hp_switch) == 'on'
         and (now() - states[_hp_switch].last_changed).total_seconds() > 40 }}
    {% else %}
      true
    {% endif %}

  # Higher-priority device has been OFF long enough to cascade turn-off.
  # Never true when no higher-priority device is configured.
  hp_off_cascade: >-
    {% if _hp_switch is not none %}
      {{ states(_hp_switch) == 'off'
         and (now() - states[_hp_switch].last_changed).total_seconds() > 40 }}
    {% else %}
      false
    {% endif %}

  # Final verdicts
  should_be_on:  "{{ solar_window_ok and grid_allows_on and hp_on_stable }}"
  should_be_off: "{{ (not solar_window_ok) or hp_off_cascade or (grid_forces_off and not lp_is_on) }}"

# trigger_variables are evaluated before triggers fire, making !input values
# safely available to template triggers — returns false when input is not set.
trigger_variables:
  _tv_hp:               !input higher_priority_switch
  _tv_lp:               !input lower_priority_switch
  _tv_grid:             !input grid_sensor
  _tv_grid_attr:        !input grid_sensor_attribute
  _tv_max_grid:         !input max_grid_consumption
  _tv_margin:           !input anti_flapping_margin
  _tv_max_watts:        !input device_max_watts
  _tv_zero_feedin:      !input zero_feed_in
  _tv_effective_margin: "{{ [(_tv_margin | float), ((_tv_max_grid | float) - 25)] | min }}"

trigger:
  # Grid drops below turn-on threshold → surplus has appeared
  - platform: template
    value_template: >-
      {% set gp = state_attr(_tv_grid, _tv_grid_attr) | float(0)
                  if _tv_grid_attr
                  else states(_tv_grid) | float(0) %}
      {% set base = (_tv_max_grid | float) - (_tv_effective_margin | float) %}
      {% set effective = base - (_tv_max_watts | float) if (not _tv_zero_feedin or gp > 0) else base %}
      {{ gp < effective }}
    id: grid_surplus

  # Grid rises above turn-off threshold → consumption too high
  - platform: template
    value_template: >-
      {% set gp = state_attr(_tv_grid, _tv_grid_attr) | float(0)
                  if _tv_grid_attr
                  else states(_tv_grid) | float(0) %}
      {{ gp > ((_tv_max_grid | float) + (_tv_effective_margin | float)) }}
    id: grid_import

  # Sun enters operating elevation (potential turn-on)
  - platform: numeric_state
    entity_id: sun.sun
    attribute: elevation
    above: !input min_elevation
    id: sun_up

  # Sun drops below operating elevation (turn-off)
  - platform: numeric_state
    entity_id: sun.sun
    attribute: elevation
    below: !input min_elevation
    id: sun_down

  # Sun azimuth crosses East boundary (morning shade clears)
  - platform: numeric_state
    entity_id: sun.sun
    attribute: azimuth
    above: !input min_azimuth
    id: az_enters_east

  # Sun azimuth crosses West boundary (evening shade begins)
  - platform: numeric_state
    entity_id: sun.sun
    attribute: azimuth
    above: !input max_azimuth
    id: az_exits_west

  # Higher-priority device has been ON for 40 s → cascade turn-on signal
  # Template returns false (never fires) when higher_priority_switch is not set.
  - platform: template
    value_template: >-
      {{ _tv_hp is not none and states(_tv_hp) == 'on' }}
    for:
      seconds: 40
    id: hp_on

  # Higher-priority device has been OFF for 40 s → cascade turn-off signal
  - platform: template
    value_template: >-
      {{ _tv_hp is not none and states(_tv_hp) == 'off' }}
    for:
      seconds: 40
    id: hp_off

  # Lower-priority device has been OFF for 40 s → re-evaluate this device
  # Template returns false (never fires) when lower_priority_switch is not set.
  - platform: template
    value_template: >-
      {{ _tv_lp is not none and states(_tv_lp) == 'off' }}
    for:
      seconds: 40
    id: lp_off

  # Device recovers from unavailable state → safety turn-off
  - platform: state
    entity_id: !input device_switch
    from: unavailable
    id: device_recovered

  # Periodic safety check every 5 min — retries if a device ignored a command
  # or if a trigger edge was missed. lp_is_on guard in should_be_off ensures
  # only the lowest-priority active device turns off; cascade proceeds normally.
  - platform: time_pattern
    minutes: "/5"
    id: periodic


action:
  - choose:

      # ── 1. SAFETY: device just came back from unavailable ──────────────
      # Always turn off regardless of conditions — don't leave the device
      # in an unknown state after a power cut or HA restart.
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'device_recovered' }}"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input device_switch

      # ── 2. TURN ON ────────────────────────────────────────────────────
      # Fires on grid improvement, sun entering range, hp cascade, or periodic.
      # All three conditions must hold: solar window OK, grid below threshold,
      # higher-priority device has been running long enough (or doesn't exist).
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.id in
                   ['grid_surplus', 'sun_up', 'az_enters_east', 'hp_on', 'periodic'] }}
          - condition: template
            value_template: "{{ states(_switch) not in ['on', 'unavailable'] }}"
          - condition: template
            value_template: "{{ should_be_on }}"
        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input device_switch
          - delay:
              seconds: 5
          - service: switch.turn_on
            target:
              entity_id: !input device_switch

      # ── 3. TURN OFF ───────────────────────────────────────────────────
      # Fires on grid deterioration, sun leaving range, hp cascade, or periodic.
      # Any single bad condition is enough to turn off.
      - conditions:
          - condition: template
            value_template: >-
              {{ trigger.id in
                   ['grid_import', 'sun_down', 'az_exits_west',
                    'hp_off', 'lp_off', 'periodic'] }}
          - condition: template
            value_template: "{{ states(_switch) not in ['off', 'unavailable'] }}"
          - condition: template
            value_template: "{{ should_be_off }}"
        sequence:
          - service: switch.turn_off
            target:
              entity_id: !input device_switch
          - delay:
              seconds: 5
          - service: switch.turn_off
            target:
              entity_id: !input device_switch
